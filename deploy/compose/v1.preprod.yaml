# Overlay for a single-node pre-production evaluation stack. It deliberately
# disables all development identity injection and requires the built-in Web BFF
# OIDC Authorization Code + PKCE configuration.
services:
  api:
    environment:
      ENVIRONMENT: staging
      ROUTEPILOT_V1_DEV_AUTH: "0"
      ROUTEPILOT_V1_DEV_BFF_SECRET: ""
      ROUTEPILOT_OIDC_ISSUER: ${ROUTEPILOT_OIDC_ISSUER:?Set ROUTEPILOT_OIDC_ISSUER}
      ROUTEPILOT_OIDC_AUDIENCE: ${ROUTEPILOT_OIDC_AUDIENCE:?Set ROUTEPILOT_OIDC_AUDIENCE}
      ROUTEPILOT_OIDC_JWKS_URL: ${ROUTEPILOT_OIDC_JWKS_URL:?Set ROUTEPILOT_OIDC_JWKS_URL}
      ROUTEPILOT_OIDC_ALGORITHMS: ${ROUTEPILOT_OIDC_ALGORITHMS:-RS256,ES256}
  run-worker:
    environment:
      ENVIRONMENT: staging
  outbox-dispatcher:
    environment:
      ENVIRONMENT: staging
  web:
    environment:
      ROUTEPILOT_DEPLOYMENT_ENV: staging
      ROUTEPILOT_PUBLIC_ORIGIN: ${ROUTEPILOT_PUBLIC_ORIGIN:?Set the HTTPS ROUTEPILOT_PUBLIC_ORIGIN}
      ROUTEPILOT_BFF_DEV_AUTH: "0"
      ROUTEPILOT_V1_DEV_BFF_SECRET: ""
      ROUTEPILOT_ACCESS_TOKEN_COOKIE_NAME: __Host-routepilot_access_token
      ROUTEPILOT_OIDC_ISSUER: ${ROUTEPILOT_OIDC_ISSUER:?Set ROUTEPILOT_OIDC_ISSUER}
      ROUTEPILOT_OIDC_AUTHORIZATION_URL: ${ROUTEPILOT_OIDC_AUTHORIZATION_URL:?Set the explicit OIDC authorization URL}
      ROUTEPILOT_OIDC_TOKEN_URL: ${ROUTEPILOT_OIDC_TOKEN_URL:?Set the explicit OIDC token URL}
      ROUTEPILOT_OIDC_END_SESSION_URL: ${ROUTEPILOT_OIDC_END_SESSION_URL:?Set the explicit OIDC end-session URL}
      ROUTEPILOT_OIDC_JWKS_URL: ${ROUTEPILOT_OIDC_JWKS_URL:?Set the explicit OIDC JWKS URL}
      ROUTEPILOT_OIDC_CLIENT_ID: ${ROUTEPILOT_OIDC_CLIENT_ID:?Set ROUTEPILOT_OIDC_CLIENT_ID}
      ROUTEPILOT_OIDC_CLIENT_SECRET: ${ROUTEPILOT_OIDC_CLIENT_SECRET:?Set ROUTEPILOT_OIDC_CLIENT_SECRET}
      ROUTEPILOT_OIDC_COOKIE_KEY: ${ROUTEPILOT_OIDC_COOKIE_KEY:?Set a base64url-encoded 32-byte OIDC cookie key}
      ROUTEPILOT_OIDC_SCOPES: ${ROUTEPILOT_OIDC_SCOPES:-openid profile email offline_access}
      ROUTEPILOT_OIDC_ALGORITHMS: ${ROUTEPILOT_OIDC_ALGORITHMS:-RS256,ES256}
