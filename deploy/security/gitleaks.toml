title = "RoutePilot repository secret scanning policy"

[extend]
useDefault = true

[allowlist]
description = "Example configuration files contain placeholder tokens that should not fail CI."
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)v1\.env\.example$''',
]
regexes = [
  '''example\.invalid''',
  '''placeholder_not_a_real_provider_key''',
]
