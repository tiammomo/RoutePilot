# =============================================================================
# 小帅旅游助手 - 基础设施配置
# =============================================================================
# 文件路径: .claude/infrastructure.yaml
# =============================================================================
# 说明: 此文件包含所有基础设施服务的连接配置和凭证信息
# 注意: 此文件已被 .gitignore 忽略，请勿提交到代码仓库
# =============================================================================
# 版本: 2.0.0 (2025-02-04)
# 更新: Claude
# =============================================================================

# =============================================================================
# 第一部分: 服务连接信息 (所有环境通用)
# =============================================================================
# 此部分包含所有基础设施服务的连接地址和端口
# 可以安全地在团队中共享

# =============================================================================
# 1.1 Redis 服务 (消息队列 & 缓存)
# =============================================================================
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  # 连接池配置
  pool:
    max_connections: 50
    timeout: 5.0
  # 队列配置
  queues:
    task_queue: "travel:tasks"
    message_queue: "travel:messages"
    event_queue: "travel:events"
  # 键前缀
  key_prefix: "travel:"
  # TTL 配置 (秒)
  ttl:
    session: 86400      # 1天
    cache: 3600         # 1小时
    rate_limit: 60      # 1分钟
    llm_response: 7200   # 2小时 (LLM 响应缓存)
  # LLM 响应缓存配置
  llm_cache:
    enabled: true
    default_ttl: 7200
    max_memory_percent: 10
    key_prefix: "llm:cache:"
  # API 限流配置
  rate_limiting:
    enabled: true
    default_rate: 60
    default_window: 60
    strategy: "sliding_window"
    # 不同端点的限流配置
    endpoints:
      /api/chat/stream:
        rate: 30
        window: 60
      /api/sessions:
        rate: 120
        window: 60
      /api/models:
        rate: 60
        window: 60
  # 连接命令
  cli_command: "redis-cli -h localhost -p 6379"

# =============================================================================
# 1.2 Milvus 服务 (向量数据库)
# =============================================================================
milvus:
  host: "localhost"
  port: 19530
  health_port: 9091
  db_name: "default"
  user: ""
  password: ""
  secure: false
  # 集合配置
  collections:
    travel_documents:
      name: "travel_documents"
      dimension: 1024
      metric_type: "COSINE"
      index_type: "FLAT"
      description: "旅游知识库 RAG 文档"
    user_preferences:
      name: "user_preferences"
      dimension: 512
      metric_type: "COSINE"
      index_type: "HNSW"
      description: "用户偏好向量存储"
    conversations:
      name: "conversations"
      dimension: 768
      metric_type: "COSINE"
      index_type: "IVF_FLAT"
      description: "对话历史向量存储"
    # 新增: LLM 响应缓存集合
    llm_cache:
      name: "llm_cache_vectors"
      dimension: 1024
      metric_type: "COSINE"
      index_type: "FLAT"
      description: "LLM 响应语义缓存"
  # 连接配置
  connection:
    timeout: 30.0
    pool_size: 10
  # 健康检查
  health_url: "http://localhost:9091/healthz"

# =============================================================================
# 1.3 Nacos 服务 (配置中心 & 服务发现)
# =============================================================================
nacos:
  server_addresses:
    - "http://localhost:38848"
  namespace: "travel-agent"
  group: "DEFAULT_GROUP"
  username: "nacos"
  password: "nacos"
  # 数据 ID 前缀
  data_id_prefix: "travel-agent-"
  # 配置监听
  heartbeat_interval: 5.0
  timeout: 5.0
  # 集群配置
  cluster:
    enabled: true
    nodes: []
  # 服务端口
  http_port: 38848
  grpc_port: 39848
  # 启用配置热更新
  config_hot_reload:
    enabled: true
    watch_patterns:
      - "travel-agent-*"
    auto_refresh: true
    refresh_interval: 5

# =============================================================================
# 1.4 MinIO 服务 (Milvus 存储后端 / 对象存储)
# =============================================================================
minio:
  endpoint: "localhost:9000"
  console_port: 9001
  access_key: "minioadmin"
  secret_key: "minioadmin"
  secure: false
  bucket: "travel-agent"
  # Milvus 专用路径
  milvus:
    bucket: "milvus"
    path: "file"
  # 控制台 URL
  console_url: "http://localhost:9001"

# =============================================================================
# 1.5 MySQL 服务 (Nacos 数据库)
# =============================================================================
mysql:
  host: "localhost"
  port: 3306
  username: "root"
  password: "rootpassword"
  database: "nacos_config"
  pool:
    size: 10
    timeout: 30.0
  # 连接 URL 模板
  connection_url_template: "mysql+pymysql://{user}:{password}@{host}:{port}/{database}"

# =============================================================================
# 1.6 应用服务端口
# =============================================================================
services:
  agent_grpc:
    host: "0.0.0.0"
    port: 50051
    protocol: "gRPC"
  web_api:
    host: "0.0.0.0"
    port: 48081
    protocol: "HTTP"
    docs_url: "http://localhost:48081/docs"
  frontend:
    host: "0.0.0.0"
    port: 43001
    protocol: "HTTP (Next.js)"

# =============================================================================
# 第二部分: 敏感凭证信息 (切勿分享)
# =============================================================================
# 此部分包含敏感信息，如 API Keys、密码等
# 仅限本地开发使用，不要提交到代码仓库

credentials:
  # LLM API Keys (从 config/llm_config.yaml 读取)
  llm:
    # OpenAI API Key
    openai_api_key: ""
    # Anthropic API Key
    anthropic_api_key: ""
    # Google API Key
    google_api_key: ""
    # MiniMax API Key
    minimax_api_key: ""
    # Ollama (本地无需 Key)
    ollama_api_key: ""

  # 数据库密码
  databases:
    mysql_root_password: "rootpassword"
    mysql_nacos_password: "nacos"

  # 基础设施密码
  infrastructure:
    redis_password: ""
    milvus_password: ""
    nacos_password: "nacos"
    minio_access_key: "minioadmin"
    minio_secret_key: "minioadmin"

  # JWT 密钥 (用于会话管理)
  jwt:
    secret_key: ""
    algorithm: "HS256"
    token_expire_hours: 24

  # API 密钥 (用于第三方服务)
  api_keys:
    map_service: ""        # 地图服务 API Key
    weather_service: ""    # 天气服务 API Key

# =============================================================================
# 第三部分: 环境配置
# =============================================================================
# 不同环境的配置差异

environments:
  development:
    name: "开发环境"
    description: "本地开发使用"
    redis:
      host: "localhost"
      port: 6379
    milvus:
      host: "localhost"
      port: 19530
    nacos:
      server_addresses:
        - "http://localhost:38848"
    debug_mode: true
    log_level: "DEBUG"

  staging:
    name: "预发布环境"
    description: "测试部署使用"
    redis:
      host: "staging-redis.example.com"
      port: 6379
    milvus:
      host: "staging-milvus.example.com"
      port: 19530
    nacos:
      server_addresses:
        - "http://staging-nacos.example.com:38848"
    debug_mode: false
    log_level: "INFO"

  production:
    name: "生产环境"
    description: "线上部署使用"
    redis:
      host: "prod-redis.example.com"
      port: 6379
    milvus:
      host: "prod-milvus.example.com"
      port: 19530
    nacos:
      server_addresses:
        - "http://prod-nacos.example.com:38848"
    debug_mode: false
    log_level: "WARNING"

# =============================================================================
# 第四部分: 连接验证命令
# =============================================================================
health_checks:
  redis:
    name: "Redis 连接测试"
    command: "redis-cli -h localhost -p 6379 ping"
    expected_response: "PONG"
    service_port: 6379

  milvus:
    name: "Milvus 健康检查"
    command: "curl -s http://localhost:9091/healthz"
    expected_response: "OK"
    service_port: 9091

  nacos:
    name: "Nacos 服务列表"
    command: "curl -s http://localhost:38848/nacos/v1/ns/service/list"
    expected_response: "success"
    service_port: 38848

  minio:
    name: "MinIO 健康检查"
    command: "curl -s http://localhost:9000/minio/health/live"
    expected_response: "ok"
    service_port: 9000

  mysql:
    name: "MySQL 连接测试"
    command: "mysql -h localhost -P 3306 -u root -prootpassword -e 'SELECT 1'"
    expected_response: "1"
    service_port: 3306

# =============================================================================
# 第五部分: 快速启动命令
# =============================================================================
quick_start:
  description: "启动所有基础设施服务"

  commands:
    docker_compose: |
      # 方式1: 使用 Docker Compose 启动所有服务
      docker-compose up -d

    docker_compose_logs: |
      # 查看所有服务日志
      docker-compose logs -f

    docker_compose_stop: |
      # 停止所有服务
      docker-compose down

    docker_compose_stop_volumes: |
      # 停止并删除数据卷 (慎用！会删除所有数据)
      docker-compose down -v

    redis_only: |
      # 单独启动 Redis
      docker run -d --name redis \
        -p 6379:6379 \
        -v redis_data:/data \
        redis:7-alpine redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    milvus_only: |
      # 单独启动 Milvus (需要先启动 etcd 和 MinIO)
      docker run -d --name milvus-etcd \
        -p 2379:2379 \
        quay.io/coreos/etcd:v3.5.16

      docker run -d --name milvus-minio \
        -p 9000:9000 -p 9001:9001 \
        -e MINIO_ROOT_USER=minioadmin \
        -e MINIO_ROOT_PASSWORD=minioadmin \
        minio/minio server /minio_data --console-address ":9001"

      docker run -d --name milvus \
        -p 19530:19530 -p 9091:9091 \
        -v milvus_data:/var/lib/milvus \
        milvusdb/milvus:v2.5.10

    nacos_only: |
      # 单独启动 Nacos (嵌入式数据库)
      docker run -d --name nacos \
        -p 38848:38848 -p 39848:39848 \
        -v nacos_data:/home/nacos/data \
        nacos/nacos-server:v2.3.2

    check_status: |
      # 检查所有服务状态
      docker-compose ps

# =============================================================================
# 第六部分: LLM 配置路径
# =============================================================================
llm_config:
  path: "config/llm_config.yaml"
  template_path: "config/llm_config.yaml.example"
  environment_variables:
    provider: "LLM_PROVIDER"
    api_key: "LLM_API_KEY"
    model: "LLM_MODEL"

# =============================================================================
# 第七部分: Docker 服务配置摘要
# =============================================================================
docker_services:
  redis:
    container_name: "redis"
    image: "redis:7-alpine"
    ports:
      - "6379:6379"
    volumes:
      - "redis_data:/data"
    command: "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: "10s"
      timeout: "5s"
      retries: 3

  milvus_etcd:
    container_name: "milvus-etcd"
    image: "quay.io/coreos/etcd:v3.5.16"
    ports:
      - "2379:2379"
    volumes:
      - "milvus_etcd_data:/etcd"

  milvus_minio:
    container_name: "milvus-minio"
    image: "minio/minio:RELEASE.2023-03-20T20-16-18Z"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - "milvus_minio_data:/minio_data"
    command: "minio server /minio_data --console-address \":9001\""

  milvus:
    container_name: "milvus"
    image: "milvusdb/milvus:v2.5.10"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - "milvus_data:/var/lib/milvus"
    environment:
      ETCD_ENDPOINTS: "milvus-etcd:2379"
      MINIO_ADDRESS: "milvus-minio:9000"
    depends_on:
      - "milvus-etcd"
      - "milvus-minio"

  nacos:
    container_name: "nacos"
    image: "nacos/nacos-server:v2.3.2"
    ports:
      - "38848:38848"
      - "39848:39848"
    volumes:
      - "nacos_data:/home/nacos/data"
      - "nacos_logs:/home/nacos/logs"
    environment:
      MODE: "standalone"

  mysql:
    container_name: "mysql"
    image: "mysql:8.0-debian"
    ports:
      - "3306:3306"
    volumes:
      - "mysql_data:/var/lib/mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "rootpassword"
      MYSQL_DATABASE: "nacos_config"
      MYSQL_USER: "nacos"
      MYSQL_PASSWORD: "nacos"

# =============================================================================
# 第八部分: 数据卷配置
# =============================================================================
volumes:
  redis_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/redis"

  milvus_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/milvus"

  milvus_etcd_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/milvus-etcd"

  milvus_minio_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/minio"

  nacos_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/nacos"

  nacos_logs:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/nacos-logs"

  mysql_data:
    driver: "local"
    driver_opts:
      type: "none"
      o: "bind"
      device: "/data/mysql"

# =============================================================================
# 第九部分: 端口映射摘要
# =============================================================================
port_mapping:
  # 服务端口
  services:
    - name: "Redis"
      internal_port: 6379
      external_port: "127.0.0.1:6379"
      protocol: "TCP"
      purpose: "消息队列、缓存"

    - name: "Milvus gRPC"
      internal_port: 19530
      external_port: "127.0.0.1:19530"
      protocol: "TCP"
      purpose: "向量数据库 gRPC"

    - name: "Milvus HTTP"
      internal_port: 9091
      external_port: "127.0.0.1:9091"
      protocol: "HTTP"
      purpose: "Milvus 健康检查"

    - name: "Nacos HTTP"
      internal_port: 38848
      external_port: "127.0.0.1:38848"
      protocol: "HTTP"
      purpose: "配置中心"

    - name: "Nacos gRPC"
      internal_port: 39848
      external_port: "127.0.0.1:39848"
      protocol: "TCP"
      purpose: "Nacos 服务通信"

    - name: "MinIO API"
      internal_port: 9000
      external_port: "127.0.0.1:9000"
      protocol: "TCP"
      purpose: "对象存储 API"

    - name: "MinIO Console"
      internal_port: 9001
      external_port: "127.0.0.1:9001"
      protocol: "HTTP"
      purpose: "MinIO 控制台"

    - name: "MySQL"
      internal_port: 3306
      external_port: "127.0.0.1:3306"
      protocol: "TCP"
      purpose: "数据库 (Nacos)"

# =============================================================================
# 第十部分: 相关文档链接
# =============================================================================
documentation:
  infrastructure_guide: "docs/INFRASTRUCTURE.md"
  architecture: "docs/ARCHITECTURE.md"
  integration_tests: "docs/INTEGRATION_TESTS.md"
  api_docs: "docs/api.md"
  changelog: "CHANGELOG.md"
  docker_compose: "docker-compose.infra.yaml"

# =============================================================================
# 配置版本信息
# =============================================================================
config_version: "2.0.0"
last_updated: "2025-02-04"
updated_by: "Claude"
changelog_url: "CHANGELOG.md"
