name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Run unit tests (ConfigManager)
        run: |
          source .venv/bin/activate
          cd agent
          PYTHONPATH=src python -m pytest tests/test_config_manager.py -v

      - name: Run unit tests (LLM Client)
        run: |
          source .venv/bin/activate
          cd agent
          PYTHONPATH=src python -m pytest tests/test_llm_client.py -v

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: |
          ruff check agent/src/

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mypy

      - name: Run mypy type check
        run: |
          mypy agent/src/config/config_manager.py --ignore-missing-imports || true
